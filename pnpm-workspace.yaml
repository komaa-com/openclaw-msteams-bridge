# Single-package "workspace" — exists only to pin one @types/node (avoids the multi-version
# ChildProcess/EventEmitter clash @types/ws's "@types/node: *" otherwise introduces).
packages:
  - "."
allowBuilds:
  '@google/genai': true
  esbuild: true
  openclaw: true
  protobufjs: true
  tree-sitter-bash: true
minimumReleaseAgeExclude:
  - openclaw@2026.6.10
overrides:
  "@types/node": "^22"
