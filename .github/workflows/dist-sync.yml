name: CI (dist sync + tests)

# The package ships PREBUILT: dist/ is committed and npm/ClawHub installs run it as-is, so a dist/
# that drifts from src/ ships stale code to every user. This gate fails any PR or main push where a
# fresh build does not reproduce the committed dist/ byte-for-byte, and runs the unit tests.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dist-sync:
    # Hosted, NOT self-hosted: this repo is public (npm provenance), so hosted minutes are free and
    # fork PRs must never execute on org VMs. The org runner group excludes public repos by default.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          # 22, not publish.yml's 20: the vitest dep chain (undici) needs it, and 22 matches dev.
          node-version: 22
          cache: pnpm

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: dist/ must be byte-identical to the fresh build
        run: |
          if ! git diff --exit-code -- dist; then
            echo "::error::dist/ is out of sync with src/ - run 'pnpm build' and commit the result."
            exit 1
          fi
          # Catch files the build produces that were never committed (diff alone misses untracked).
          untracked="$(git status --porcelain dist | grep '^??' || true)"
          if [ -n "$untracked" ]; then
            echo "::error::build produced uncommitted dist files:"
            echo "$untracked"
            exit 1
          fi
