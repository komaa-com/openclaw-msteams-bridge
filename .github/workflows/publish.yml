name: Publish to npm

# Publishes @komaa/openclaw-msteams-bridge when you push a version tag (e.g. `v0.1.1`) or publish a GitHub Release.
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # enables npm provenance (supply-chain attestation); needs a public repo

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Safety: on a tag push, the tag must equal the package.json version (e.g. tag v0.1.1 == "0.1.1").
      - name: Tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - name: Test
        run: pnpm test

      # publishConfig.access=public is set; prepublishOnly runs the typecheck. --provenance attests the build.
      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Also publish to ClawHub (it does NOT auto-sync from npm). Token auth, because the OIDC
      # trusted-publishing path returned "Not logged in" in CI (v0.2.4) — a stored token is reliable.
      # best-effort: a ClawHub-side hiccup must never fail an already-successful npm release; the manual
      # fallback is `clawhub package publish <owner>/<repo>@<tag> --manual-override-reason "<why>"` from a
      # maintainer machine that ran `clawhub login`.
      - name: Publish to ClawHub
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          npm i -g clawhub
          clawhub login --token "$CLAWHUB_TOKEN"
          clawhub package publish "${GITHUB_REPOSITORY}@${GITHUB_REF_NAME}" \
            --manual-override-reason "CI auto-publish on tag ${GITHUB_REF_NAME}"
